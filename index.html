// ── Submissions List ──────────────────────────────────────────────────────────

function SubmissionsList({ role }) {
  const isRAEU = ['R-05','R-06'].includes(role.id);
  const list = isRAEU ? SUBMISSIONS : SUBMISSIONS.filter(s => s.provider === 'ΔΕΥΑ Αθηναίων');
  const [sel, setSel] = useState(null);

  return (
    <div className="grid-2">
      <div className="card">
        <div className="card-header">
          <span className="card-title">{isRAEU ? 'Υποβολές Παρόχων' : 'Ιστορικό Υποβολών'}</span>
          <span className="text-xs text-muted">{list.length} εγγραφές</span>
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                {isRAEU && <th>Πάροχος</th>}
                <th>Περίοδος</th>
                <th>Τύπος</th>
                <th>Κατάσταση</th>
                <th>Υποβολή</th>
              </tr>
            </thead>
            <tbody>
              {list.map(s => (
                <tr key={s.id} onClick={() => setSel(s)} style={{cursor:'pointer', background: sel?.id === s.id ? '#eff6ff' : undefined}}>
                  <td className="font-mono text-xs">{s.id}</td>
                  {isRAEU && <td style={{fontWeight:500}}>{s.provider}</td>}
                  <td>{s.period}</td>
                  <td className="text-xs">{s.type}</td>
                  <td><StateBadge state={s.state} /></td>
                  <td className="text-xs text-muted">{s.submitted}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      <div>
        {sel ? (
          <div className="card">
            <div className="card-header">
              <span className="card-title">Λεπτομέρειες Υποβολής</span>
              <button className="btn btn-secondary btn-sm" onClick={() => setSel(null)}>✕</button>
            </div>
            <div className="card-body">
              <div className="flex justify-between mb-3">
                <span className="font-mono text-xs" style={{color:'#2563eb'}}>{sel.id}</span>
                <StateBadge state={sel.state} />
              </div>
              {[
                ['Πάροχος', sel.provider],
                ['Τύπος', sel.type],
                ['Περίοδος', sel.period],
                ['Προθεσμία', sel.deadline],
                ['Ημ. Υποβολής', sel.submitted],
                ['Επιθεωρητής', sel.inspector],
              ].map(([l, v]) => (
                <div key={l} className="flex justify-between" style={{padding:'7px 0',borderBottom:'1px solid #f1f5f9'}}>
                  <span className="text-xs text-muted">{l}</span>
                  <span className="text-sm" style={{fontWeight:500}}>{v}</span>
                </div>
              ))}

              <div style={{marginTop:16}}>
                <div className="text-xs text-muted mb-2">Ροή Κατάστασης</div>
                <div className="stepper">
                  {['S-01','S-02','S-04','S-05',sel.state === 'S-06' ? 'S-06' : 'S-07'].map((s, i, arr) => {
                    const states = ['S-01','S-02','S-03','S-04','S-05','S-06','S-07','S-08'];
                    const curIdx = states.indexOf(sel.state);
                    const stepIdx = states.indexOf(s);
                    const done = stepIdx <= curIdx;
                    const current = s === sel.state;
                    return (
                      <div className="step" key={s}>
                        {i < arr.length - 1 && <div className={`step-line ${done ? 'done' : 'pending'}`} />}
                        <div className={`step-dot ${current ? 'current' : done ? 'done' : 'pending'}`}>{done && !current ? '✓' : i+1}</div>
                        <div className={`step-label ${done ? 'active' : ''}`}>{STATE_META[s]?.label || s}</div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {isRAEU && ['S-04','S-05'].includes(sel.state) && (
                <div className="mt-4 flex gap-2">
                  <button className="btn btn-success btn-sm">✅ Αποδοχή</button>
                  <button className="btn btn-danger btn-sm">↩ Επιστροφή</button>
                  <button className="btn btn-secondary btn-sm">💬 Διευκρίνιση</button>
                </div>
              )}
            </div>
          </div>
        ) : (
          <div className="card" style={{padding:32,textAlign:'center',color:'#94a3b8'}}>
            <div style={{fontSize:32,marginBottom:8}}>📄</div>
            <div className="text-sm">Επιλέξτε υποβολή για λεπτομέρειες</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── App Shell ─────────────────────────────────────────────────────────────────

const PAGE_TITLES = {
  dashboard: 'Πίνακας Ελέγχου',
  submit: 'Υποβολή Δεδομένων',
  submissions: 'Υποβολές',
  kpis: 'Δείκτες KPI',
  providers: 'Μητρώο Παρόχων',
  public: 'Δημόσια Πύλη',
  schemas: 'Σχήματα & Κανόνες Επικύρωσης',
};

function App() {
  const [role, setRole] = useState(null);
  const [page, setPage] = useState('dashboard');

  if (!role) return <LoginScreen onLogin={r => { setRole(r); setPage('dashboard'); }} />;

  const isRAEU = ['R-05','R-06','R-07','R-08'].includes(role.id);

  const renderPage = () => {
    if (page === 'dashboard') return isRAEU ? <RAEUDashboard /> : <ProviderDashboard />;
    if (page === 'submit') return <DataEntryForm role={role} />;
    if (page === 'submissions') return <SubmissionsList role={role} />;
    if (page === 'kpis') return <KPIDashboard />;
    if (page === 'providers') return <ProvidersPage />;
    if (page === 'public') return <PublicPortal />;
    if (page === 'schemas') return <SchemasPage />;
    return null;
  };

  return (
    <div className="app">
      <Sidebar role={role} page={page} onNav={setPage} onLogout={() => { setRole(null); setPage('dashboard'); }} />
      <div className="main">
        <div className="topbar">
          <div className="topbar-title">{PAGE_TITLES[page]}</div>
          <div className="topbar-actions">
            <span className="badge badge-ready">{role.id}</span>
            <span className="text-xs text-muted">{role.org}</span>
          </div>
        </div>
        <div className="content">{renderPage()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
